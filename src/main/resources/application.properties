spring.application.name=painel-economico-api
spring-boot.ls.problem.application-properties.prop-unknown-property: "IGNORE"

# API's Externas
awesome.api.url=https://economia.awesomeapi.com.br/json

brapi.api.url=https://brapi.dev/api
brapi.api.token=${BRAPI_TOKEN}

news.api.url=https://newsapi.org/v2
news.api.key=${NEWS_API_KEY:}

# Banco de Dados (Supabase)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate 
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT (24 horas)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.app.name=Painel Economico BFF
management.info.app.version=2.0.0

# Configuração do Resilience4j
resilience4j.circuitbreaker.instances.indicators.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.indicators.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.indicators.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.indicators.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.indicators.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.indicators.sliding-window-size=10