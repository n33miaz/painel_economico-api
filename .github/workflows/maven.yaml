name: Java CI with Maven

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Criar arquivo .env temporário (para testes)
        run: echo "NEWS_API_KEY=test_key_mock" > .env

      - name: Compilar e Rodar Testes
        run: mvn -B package --file pom.xml

      - name: Upload do Artifact
        uses: actions/upload-artifact@v4
        with:
          name: painel-economico-jar
          path: target/*.jar
          retention-days: 1
